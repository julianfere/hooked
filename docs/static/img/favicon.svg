<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" fill="#1e1e2e"/>
  <!-- Eye (ring at top) -->
  <circle cx="50" cy="13" r="7" fill="none" stroke="url(#g)" stroke-width="5"/>
  <!-- Shank + J-bend (clockwise around bottom) -->
  <path d="M 50 20 L 50 60 A 18 18 0 1 1 32 42"
